name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 services/ --max-line-length=120 --exclude=__pycache__ --ignore=E302,E305,E221,F401,E501,E241,E123

      - name: Check files exist
        run: |
          test -f docker-compose.yml
          test -f services/api/main.py
          test -f services/producer/producer.py
          test -f services/spark/batch_revenue.py
          test -f services/dashboard/index.html
          echo "All files present"
